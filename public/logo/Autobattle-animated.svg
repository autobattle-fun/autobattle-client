  <path class="part2" d="M201.063,244.244l-141.184,-90.596c-21.46,-12.251 -19.918,-35.253 3.041,-50.588l138.146,-90.51c22.96,-15.334 58.298,-16.92 78.259,-3.084l141.14,90.51c21.46,12.294 19.918,35.339 -3.041,50.631l-138.102,90.51c-21.545,15.377 -58.341,16.877 -78.259,3.127l0,-0Z" />
  
  <path class="part3" d="M185.643,279.454l-153.389,-101.219c-16.877,-12.294 -32.255,-1.542 -32.255,24.502l0,155.022c0,26.044 15.334,56.756 32.255,67.464l153.389,102.804c18.462,12.294 32.212,0 32.212,-24.545l0.043,-156.437c0,-26.129 -13.793,-55.257 -32.255,-67.594l-0,0.002Z" />
</svg>
