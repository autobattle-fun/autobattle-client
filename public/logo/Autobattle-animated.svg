<svg width="100%" height="100%" viewBox="-250 -250 976 1033" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
  <style>
    .part1 {
      fill: #8754ff;
      animation: formLogoRight 4s ease-in-out infinite;
    }
    .part2 {
      fill: #8754ff;
      animation: formLogoTop 4s ease-in-out infinite;
    }
    .part3 {
      fill: #8754ff;
      animation: formLogoLeft 4s ease-in-out infinite;
    }

    /* Right piece comes from the bottom-right */
    @keyframes formLogoRight {
      0%, 100% { transform: translate(200px, 200px); opacity: 0; }
      40%, 60% { transform: translate(0px, 0px); opacity: 1; }
    }

    /* Top piece comes from the top */
    @keyframes formLogoTop {
      0%, 100% { transform: translate(0px, -200px); opacity: 0; }
      40%, 60% { transform: translate(0px, 0px); opacity: 1; }
    }

    /* Left piece comes from the bottom-left */
    @keyframes formLogoLeft {
      0%, 100% { transform: translate(-200px, 200px); opacity: 0; }
      40%, 60% { transform: translate(0px, 0px); opacity: 1; }
    }
  </style>

